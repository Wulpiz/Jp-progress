<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Japanese Focus - Hardcore Mode</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg-dark: #111827;
      --card-bg: #1f2937;
      --accent-blue: #3b82f6;
      --accent-cyan: #2dd4bf;
      --text-main: #f8fafc;
      --text-dim: #94a3b8;
      --glass: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.1);
    }

    * { box-sizing: border-box; transition: all 0.2s ease; }

    body {
      margin: 0; min-height: 100vh;
      background: #0f172a;
      color: var(--text-main);
      font-family: 'Inter', system-ui, sans-serif;
      display: flex; justify-content: center; padding: 40px 20px;
    }

    .container { 
      display: none; width: 100%; max-width: 800px; 
      background: #1e293b; border-radius: 40px; padding: 60px 50px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
    }

    /* --- UI HEADER (Persis Screenshot (117).png) --- */
    .hero-section { text-align: center; margin-bottom: 50px; }
    .hero-title { font-size: 5rem; font-weight: 900; margin: 0; letter-spacing: -2px; }
    .hero-subtitle { color: var(--accent-blue); font-weight: 600; margin-top: 10px; font-size: 1.1rem; }

    .meta-row { display: flex; justify-content: space-between; align-items: flex-end; margin-top: 40px; }
    .time-large { font-size: 2.2rem; font-weight: 800; line-height: 1; }
    .date-small { color: var(--text-dim); margin-top: 5px; font-weight: 500; }
    .streak-badge { background: #334155; padding: 10px 20px; border-radius: 99px; color: #fbbf24; font-weight: 700; border: 1px solid #475569; display: flex; align-items: center; gap: 8px; }

    /* --- PROGRESS BAR --- */
    .progress-container { margin-top: 40px; }
    .progress-label { display: flex; justify-content: space-between; font-size: 0.8rem; font-weight: 800; color: var(--text-dim); text-transform: uppercase; margin-bottom: 10px; }
    .progress-track { height: 8px; background: #334155; border-radius: 10px; overflow: hidden; }
    .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent-blue), var(--accent-cyan)); }

    /* --- GOAL ITEMS --- */
    h2 { font-size: 1rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text-dim); margin: 40px 0 20px; }
    
    .goal-card {
      background: #273549; border-radius: 20px; padding: 20px; margin-bottom: 15px;
      display: flex; align-items: center; gap: 20px; border: 1px solid transparent;
    }
    .goal-card:hover { border-color: var(--glass-border); background: #2d3d54; }
    .checkbox { width: 24px; height: 24px; cursor: pointer; accent-color: var(--accent-blue); }
    .goal-info { flex: 1; }
    .goal-text { font-size: 1.1rem; font-weight: 600; }
    .goal-deadline { font-size: 0.8rem; color: #94a3b8; margin-top: 4px; }
    .completed { text-decoration: line-through; opacity: 0.4; }

    .btn-settings { background: #334155; border: none; padding: 10px; border-radius: 12px; cursor: pointer; color: white; }

    /* --- MODAL/EDIT PANEL --- */
    .edit-panel { display: none; padding: 15px; margin-top: 10px; background: rgba(0,0,0,0.2); border-radius: 15px; }
    .edit-panel.active { display: block; }
    input { background: #0f172a; border: 1px solid #475569; color: white; padding: 10px; border-radius: 8px; margin: 5px 0; width: 100%; }

    /* --- AUTH --- */
    #auth-screen { text-align: center; align-self: center; background: #1e293b; padding: 60px; border-radius: 40px; }
  </style>
</head>
<body>

  <div id="auth-screen">
    <h1 style="font-size: 4rem; margin:0;">まず日本語。</h1>
    <p style="color: var(--accent-blue); margin-bottom: 40px;">Lakukan sekarang atau lupakan selamanya.</p>
    <button onclick="loginWithGoogle()" style="background:white; color:black; padding:15px 30px; border-radius:15px; font-weight:800; border:none; cursor:pointer;">Masuk dengan Google</button>
  </div>

  <div class="container" id="main-dashboard">
    <div class="hero-section">
      <h1 class="hero-title">まず日本語。</h1>
      <p class="hero-subtitle">Lakukanlah sekarang dan paksa diri sendiri, jadikan itu sebagai kebiasaan</p>
    </div>

    <div class="meta-row">
      <div>
        <div class="time-large" id="clock">00.00.00</div>
        <div class="date-small" id="dateText">Memuat tanggal...</div>
      </div>
      <div class="streak-badge" id="streakDisplay">🔥 0 Hari</div>
    </div>

    <div class="progress-container">
      <div class="progress-label">
        <span>Progress Sekarang</span>
        <span id="percentText">0%</span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    </div>

    <h2>Daily Quests</h2>
    <div id="dailyList"></div>
    <button onclick="addNewGoal('daily')" style="background:none; border: 1px dashed #475569; color:var(--text-dim); width:100%; padding:15px; border-radius:15px; cursor:pointer; margin-top:10px;">+ Tambah Goal Harian</button>

    <h2>Monthly Goals</h2>
    <div id="monthlyList"></div>
    <button onclick="addNewGoal('monthly')" style="background:none; border: 1px dashed #475569; color:var(--text-dim); width:100%; padding:15px; border-radius:15px; cursor:pointer; margin-top:10px;">+ Tambah Goal Bulanan</button>

    <button onclick="logout()" style="display:block; margin: 50px auto 0; background:none; border:none; color:var(--text-dim); cursor:pointer; text-decoration: underline;">Logout</button>
  </div>

  <script>
    const SB_URL = 'https://ifdgmtzdgyldobeparjy.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlmZGdtdHpkZ3lsZG9iZXBhcmp5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2ODY2MTIsImV4cCI6MjA5NDI2MjYxMn0.xJqjlPNZgU3vYHhuv1IF6ph4UvsJR7oSFYM8pVByVmw';
    const clientApp = supabase.createClient(SB_URL, SB_KEY);
    let currentUser = null;
    let allGoals = [];

    async function checkUser() {
      const { data: { user } } = await clientApp.auth.getUser();
      if (user) {
        currentUser = user;
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('main-dashboard').style.display = 'block';
        fetchData();
        startClock();
      }
    }

    async function fetchData() {
      const { data } = await clientApp.from('goals').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: true });
      allGoals = data || [];
      render();
    }

    function startClock() {
      setInterval(() => {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('id-ID', { hour12: false }).replace(/:/g, '.');
        document.getElementById('dateText').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
      }, 1000);
    }

    async function addNewGoal(type) {
      const text = prompt("Masukkan nama goal:");
      if(!text) return;
      const { data } = await clientApp.from('goals').insert([{ 
        text: text, 
        user_id: currentUser.id, 
        type: type, 
        deadline: type === 'monthly' ? 'Akhir Bulan' : '24:00' 
      }]).select();
      allGoals.push(data[0]);
      render();
    }

    async function toggleGoal(id, status) {
      await clientApp.from('goals').update({ checked: !status }).eq('id', id);
      fetchData();
    }

    async function updateGoal(id, index) {
        const newText = document.getElementById(`in-text-${id}`).value;
        const newDate = document.getElementById(`in-date-${id}`).value;
        await clientApp.from('goals').update({ text: newText, deadline: newDate }).eq('id', id);
        fetchData();
    }

    async function deleteGoal(id) {
        if(!confirm("Hapus?")) return;
        await clientApp.from('goals').delete().eq('id', id);
        fetchData();
    }

    function render() {
      const dList = document.getElementById("dailyList");
      const mList = document.getElementById("monthlyList");
      dList.innerHTML = ""; mList.innerHTML = "";

      allGoals.forEach((g, i) => {
        const html = `
          <div class="goal-card">
            <input type="checkbox" class="checkbox" ${g.checked ? 'checked' : ''} onchange="toggleGoal('${g.id}', ${g.checked})">
            <div class="goal-info">
              <div class="goal-text ${g.checked ? 'completed' : ''}">${g.text}</div>
              <div class="goal-deadline">⌛ Deadline: ${g.deadline || 'Belum diset'}</div>
            </div>
            <button class="btn-settings" onclick="document.getElementById('panel-${g.id}').classList.toggle('active')">⚙️</button>
          </div>
          <div class="edit-panel" id="panel-${g.id}">
            <input type="text" id="in-text-${g.id}" value="${g.text}">
            <input type="text" id="in-date-${g.id}" value="${g.deadline}">
            <button onclick="updateGoal('${g.id}')" style="background:var(--accent-blue); color:white; border:none; padding:8px; border-radius:5px; cursor:pointer;">Simpan</button>
            <button onclick="deleteGoal('${g.id}')" style="background:red; color:white; border:none; padding:8px; border-radius:5px; cursor:pointer;">Hapus</button>
          </div>
        `;
        if(g.type === 'monthly') mList.innerHTML += html;
        else dList.innerHTML += html;
      });
      updateProgress();
    }

    function updateProgress() {
      const total = allGoals.length;
      const done = allGoals.filter(g => g.checked).length;
      const percent = total === 0 ? 0 : Math.round((done / total) * 100);
      document.getElementById("progressFill").style.width = percent + "%";
      document.getElementById("percentText").innerText = percent + "%";
      document.getElementById("streakDisplay").innerText = `🔥 ${localStorage.getItem('streak') || 0} Hari`;
    }

    async function loginWithGoogle() { await clientApp.auth.signInWithOAuth({ provider: 'google' }); }
    async function logout() { await clientApp.auth.signOut(); location.reload(); }
    checkUser();
  </script>
</body>
</html>
