<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Japanese Focus - Ultra Cloud</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg-dark: #0f172a;
      --accent-blue: #3b82f6;
      --accent-cyan: #2dd4bf;
      --text-main: #f8fafc;
      --text-dim: #94a3b8;
      --glass: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
    }

    * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

    body {
      margin: 0; min-height: 100vh;
      background: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
      color: var(--text-main);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }

    /* Memperbaiki UI Login agar Premium Kembali */
    #auth-screen {
      background: var(--glass);
      backdrop-filter: blur(30px);
      padding: 60px 40px;
      border-radius: 40px;
      border: 1px solid var(--glass-border);
      text-align: center;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 40px 100px -20px rgba(0,0,0,0.5);
    }

    #auth-screen h1 {
      font-size: 4rem;
      font-weight: 900;
      letter-spacing: -3px;
      margin-bottom: 10px;
      background: linear-gradient(to bottom, #ffffff 30%, #64748b 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    #auth-screen p {
      color: var(--accent-blue);
      font-weight: 500;
      font-size: 1.1rem;
      margin-bottom: 40px;
      opacity: 0.8;
    }

    .google-btn {
      display: inline-flex;
      align-items: center;
      gap: 15px;
      background: white;
      color: #0f172a;
      padding: 16px 32px;
      border-radius: 20px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      border: none;
      box-shadow: 0 10px 30px rgba(59, 130, 246, 0.3);
    }

    .google-btn:hover {
      transform: translateY(-5px) scale(1.02);
      box-shadow: 0 20px 40px rgba(59, 130, 246, 0.5);
    }

    /* --- Dashboard Styles (Tetap Premium) --- */
    .container {
      display: none; width: 100%; max-width: 850px;
      background: var(--glass); border: 1px solid var(--glass-border);
      border-radius: 32px; padding: 40px; backdrop-filter: blur(25px);
    }

    .progress-bar { height: 12px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; margin: 10px 0 30px; border: 1px solid var(--glass-border); }
    .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent-blue), var(--accent-cyan)); box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); }

    .goal-item {
      background: rgba(255,255,255,0.02); padding: 20px; border-radius: 20px;
      margin-bottom: 16px; border: 1px solid var(--glass-border);
    }
    .goal-item:hover { background: rgba(255,255,255,0.05); transform: translateX(5px); }

    .goal-main { display: flex; align-items: center; gap: 15px; }
    .goal-text { flex: 1; font-size: 1.2rem; font-weight: 500; }
    .checked { text-decoration: line-through; opacity: 0.3; }
    
    .edit-panel { display: none; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--glass-border); }
    .edit-panel.active { display: block; animation: slideDown 0.3s ease; }

    .input-section { background: rgba(255,255,255,0.03); padding: 25px; border-radius: 24px; margin-top: 40px; border: 1px solid var(--glass-border); }
    input[type="text"], input[type="date"], .edit-input {
      background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border);
      color: white; padding: 14px; border-radius: 12px; outline: none; width: 100%;
    }

    .add-btn { background: var(--accent-blue); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 800; cursor: pointer; width: 100%; margin-top: 10px; }
    .save-btn { background: #10b981; color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: 600; }
    .del-btn { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); padding: 10px 20px; border-radius: 10px; cursor: pointer; }

    @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

  <!-- UI Login yang sudah Diperbaiki -->
  <div id="auth-screen">
    <h1>まず日本語。</h1>
    <p>Lakukan sekarang, atau lupakan selamanya.</p>
    <button class="google-btn" onclick="loginWithGoogle()">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" alt="Google">
      Masuk dengan Google
    </button>
  </div>

  <!-- Dashboard Utama -->
  <div class="container" id="main-dashboard">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <div id="streak" style="background: rgba(250, 204, 21, 0.1); color: #facc15; padding: 8px 16px; border-radius: 99px; font-weight: 700; border: 1px solid rgba(250, 204, 21, 0.2);">🔥 0 Hari</div>
        <button onclick="logout()" style="background:none; border:none; color:var(--text-dim); cursor:pointer; text-decoration: underline; font-size: 0.8rem;">Logout</button>
    </div>
    
    <h1 style="font-size: 2.5rem; text-align: left;">まず日本語。</h1>
    <div style="color: var(--accent-blue); margin-bottom: 30px; font-weight: 500;">Fokus pada proses, hasil akan mengikuti.</div>

    <div class="progress-section">
      <div style="display: flex; justify-content: space-between; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim);">
        <span>Progress Belajar</span>
        <span id="progressPercent">0%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>

    <div id="goalsList"></div>

    <div class="input-section">
      <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 10px; margin-bottom: 10px;">
        <input type="text" id="newGoalInput" placeholder="Contoh: Belajar Kanji N3...">
        <input type="date" id="newGoalDate">
      </div>
      <button class="add-btn" onclick="addGoal()">Tambah Goal Baru</button>
    </div>
  </div>

  <script>
    // Konfigurasi Supabase (Tetap sama)
    const SB_URL = 'https://ifdgmtzdgyldobeparjy.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlmZGdtdHpkZ3lsZG9iZXBhcmp5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2ODY2MTIsImV4cCI6MjA5NDI2MjYxMn0.xJqjlPNZgU3vYHhuv1IF6ph4UvsJR7oSFYM8pVByVmw';
    const clientApp = supabase.createClient(SB_URL, SB_KEY);

    let goals = [];
    let currentUser = null;

    async function checkUser() {
      const { data: { user } } = await clientApp.auth.getUser();
      if (user) {
        currentUser = user;
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('main-dashboard').style.display = 'block';
        fetchData();
        loadStreak();
      }
    }

    async function fetchData() {
      const { data } = await clientApp.from('goals').select('*').order('created_at', { ascending: true });
      goals = data || [];
      render();
    }

    async function addGoal() {
      const text = document.getElementById("newGoalInput").value;
      const date = document.getElementById("newGoalDate").value;
      if (!text || !date) return alert("Isi teks dan tanggal dulu!");

      const { data, error } = await clientApp.from('goals').insert([{ 
        text: text, deadline: date, user_id: currentUser.id 
      }]).select();

      if (!error) {
        goals.push(data[0]);
        render();
        document.getElementById("newGoalInput").value = "";
      }
    }

    async function toggleGoal(id, currentStatus) {
      const goal = goals.find(g => g.id === id);
      goal.checked = !currentStatus;
      render();
      await clientApp.from('goals').update({ checked: !currentStatus }).eq('id', id);
      if(!currentStatus) updateStreakLogic();
    }

    async function updateGoal(id, index) {
      const newText = document.getElementById(`edit-text-${index}`).value;
      const newDate = document.getElementById(`edit-date-${index}`).value;
      const { error } = await clientApp.from('goals').update({ text: newText, deadline: newDate }).eq('id', id);
      if (!error) {
        goals[index].text = newText;
        goals[index].deadline = newDate;
        render();
        alert("Goal diperbarui!");
      }
    }

    async function deleteGoal(id) {
      if(!confirm("Hapus goal ini?")) return;
      const { error } = await clientApp.from('goals').delete().eq('id', id);
      if(!error) {
        goals = goals.filter(g => g.id !== id);
        render();
      }
    }

    function render() {
      const list = document.getElementById("goalsList");
      list.innerHTML = "";
      goals.forEach((goal, i) => {
        const item = document.createElement("div");
        item.className = "goal-item";
        item.innerHTML = `
          <div class="goal-main">
            <input type="checkbox" ${goal.checked ? "checked" : ""} onchange="toggleGoal('${goal.id}', ${goal.checked})" style="width:22px; height:22px; accent-color:var(--accent-blue); cursor:pointer;">
            <div class="goal-text ${goal.checked ? 'checked' : ''}">
              ${goal.text}
              <div style="font-size:0.8rem; color:var(--text-dim); margin-top:4px;">📅 Deadline: ${goal.deadline}</div>
            </div>
            <button onclick="document.getElementById('edit-${i}').classList.toggle('active')" style="background:none; border:none; cursor:pointer; font-size:1.2rem;">⚙️</button>
          </div>
          <div class="edit-panel" id="edit-${i}">
            <input type="text" class="edit-input" id="edit-text-${i}" value="${goal.text}" style="margin-bottom:10px;">
            <input type="date" class="edit-input" id="edit-date-${i}" value="${goal.deadline}" style="margin-bottom:15px;">
            <div style="display:flex; gap:10px;">
                <button class="save-btn" onclick="updateGoal('${goal.id}', ${i})">Simpan Perubahan</button>
                <button class="del-btn" onclick="deleteGoal('${goal.id}')">Hapus</button>
            </div>
          </div>
        `;
        list.appendChild(item);
      });
      updateProgress();
    }

    function updateProgress() {
      const total = goals.length;
      const done = goals.filter(g => g.checked).length;
      const percent = total === 0 ? 0 : Math.round((done / total) * 100);
      document.getElementById("progressFill").style.width = percent + "%";
      document.getElementById("progressPercent").innerText = percent + "%";
    }

    function loadStreak() {
      const s = localStorage.getItem(`streak_${currentUser.id}`) || 0;
      document.getElementById("streak").innerText = `🔥 ${s} Hari`;
    }

    function updateStreakLogic() {
      const today = new Date().toDateString();
      if (localStorage.getItem(`lastDate_${currentUser.id}`) !== today) {
        let s = parseInt(localStorage.getItem(`streak_${currentUser.id}`)) || 0;
        s++;
        localStorage.setItem(`streak_${currentUser.id}`, s);
        localStorage.setItem(`lastDate_${currentUser.id}`, today);
        loadStreak();
      }
    }

    async function loginWithGoogle() { await clientApp.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.href } }); }
    async function logout() { await clientApp.auth.signOut(); location.reload(); }

    checkUser();
  </script>
</body>
</html>
