<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Japanese Focus Dashboard - Final Cloud</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg-dark: #0f172a;
      --accent-blue: #3b82f6;
      --accent-cyan: #2dd4bf;
      --text-main: #f8fafc;
      --text-dim: #94a3b8;
      --glass: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.12);
    }

    * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at 0% 0%, #1e293b 0%, #0f172a 100%);
      color: var(--text-main);
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      display: flex;
      justify-content: center;
      padding: 60px 20px;
    }

    /* Auth Screen */
    #auth-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .google-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      background: white;
      color: #1f2937;
      padding: 12px 24px;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      margin-top: 20px;
    }

    /* Main Container */
    .container {
      display: none;
      width: 100%;
      max-width: 850px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 32px;
      padding: 50px;
      backdrop-filter: blur(25px);
      box-shadow: 0 25px 60px -15px rgba(0, 0, 0, 0.7);
    }

    h1 {
      margin: 0;
      text-align: center;
      font-size: clamp(40px, 6vw, 64px);
      font-weight: 800;
      letter-spacing: -2px;
      background: linear-gradient(to bottom right, #ffffff, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      text-align: center;
      color: var(--accent-blue);
      margin-top: 12px;
      font-size: 1.2rem;
      font-weight: 500;
    }

    .info-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 40px 0 20px 0;
    }

    #clock { color: var(--text-main); font-size: 1rem; line-height: 1.5; }
    #streak {
      background: rgba(250, 204, 21, 0.1);
      padding: 8px 16px;
      border-radius: 99px;
      color: #facc15;
      font-weight: 700;
      border: 1px solid rgba(250, 204, 21, 0.2);
    }

    .progress-section { margin-bottom: 40px; }
    .progress-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
    }
    .progress-bar {
      height: 12px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--glass-border);
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent-blue), var(--accent-cyan));
      box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
    }

    .goal-item {
      background: rgba(255, 255, 255, 0.02);
      padding: 20px;
      border-radius: 20px;
      margin-bottom: 16px;
      border: 1px solid var(--glass-border);
    }

    .goal-main { display: flex; align-items: center; gap: 20px; }
    .goal-content { flex: 1; }
    .goal-text { font-size: 1.2rem; font-weight: 500; }
    .checked { text-decoration: line-through; color: var(--text-dim); opacity: 0.4; }
    .deadline-label { font-size: 0.85rem; color: var(--text-dim); margin-top: 6px; }

    .settings-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--glass-border);
      color: var(--text-main);
      width: 40px; height: 40px; border-radius: 12px; cursor: pointer;
    }

    .edit-panel {
      max-height: 0; overflow: hidden; opacity: 0;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .edit-panel.active {
      max-height: 400px; opacity: 1;
      margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--glass-border);
    }

    .input-group {
      display: flex; gap: 12px; margin-top: 40px; background: rgba(255, 255, 255, 0.03);
      padding: 10px; border-radius: 20px; border: 1px solid var(--glass-border);
    }
    #newGoalInput { flex: 1; background: transparent; border: none; color: white; outline: none; padding-left: 10px; }
    .add-btn { background: var(--accent-blue); border: none; color: white; padding: 12px 24px; border-radius: 14px; cursor: pointer; font-weight: 700; }
    
    .logout-btn { margin-top: 30px; background: transparent; color: var(--text-dim); border: none; cursor: pointer; text-decoration: underline; display: block; width: 100%; text-align: center; }
  </style>
</head>
<body>

  <div id="auth-screen">
    <h1>まず日本語。</h1>
    <p class="subtitle">Lakukanlah sekarang dan paksa diri sendiri</p>
    <button class="google-btn" onclick="loginWithGoogle()">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
      Masuk dengan Google
    </button>
  </div>

  <div class="container" id="main-dashboard">
    <h1>まず日本語。</h1>
    <div class="subtitle" id="user-info">Memuat sinkronisasi...</div>
