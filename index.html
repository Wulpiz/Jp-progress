<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Japanese Focus - Zen Mode</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg-dark: #020617;
      --card-bg: #1e293b;
      --accent-blue: #3b82f6;
      --accent-cyan: #2dd4bf;
      --accent-red: #ef4444;
      --text-main: #f8fafc;
      --text-dim: #94a3b8;
      --glass: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      --accent-purple: #a855f7;
      --accent-gold: #f59e0b;
      --accent-gold-pale: #fbbf24;
    }

    * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

    body {
      margin: 0; min-height: 100vh;
      background: #020617;
      color: var(--text-main);
      font-family: 'Inter', system-ui, sans-serif;
    }

    /* --- HOMEPAGE / ZEN MODE STYLE --- */
    #homepage-screen {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 30px;
      background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
      position: fixed;
      width: 100%;
      top: 0; left: 0;
      z-index: 2000;
    }

    .zen-reminder {
      font-size: 0.9rem;
      color: var(--accent-cyan);
      text-transform: uppercase;
      letter-spacing: 5px;
      margin-bottom: 20px;
      font-weight: 800;
    }

    .zen-quote {
      font-size: 2rem;
      font-weight: 300;
      font-style: italic;
      max-width: 800px;
      line-height: 1.5;
      margin-bottom: 50px;
      color: #fff;
    }

    .btn-enter {
      padding: 18px 45px;
      background: transparent;
      border: 1px solid var(--accent-blue);
      color: var(--accent-blue);
      border-radius: 50px;
      cursor: pointer;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 1px;
    }

    .btn-enter:hover {
      background: var(--accent-blue);
      color: white;
      box-shadow: 0 0 30px rgba(59, 130, 246, 0.4);
    }

    /* --- DASHBOARD & GENERAL STYLE --- */
    #main-dashboard { display: none; padding: 40px 20px; max-width: 900px; margin: 0 auto; }
    
    .hero-title {
      font-size: 4.5rem; font-weight: 900; margin: 0; letter-spacing: -3px;
      background: linear-gradient(to right, #ffffff 20%, #3b82f6 40%, #2dd4bf 60%, #ffffff 80%);
      background-size: 200% auto; color: transparent; -webkit-background-clip: text;
      animation: shine 3s linear infinite; text-align: center;
    }
    @keyframes shine { to { background-position: 200% center; } }

    .header-info { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 30px 0; }
    .stat-card { background: rgba(0,0,0,0.2); padding: 20px; border-radius: 20px; border: 1px solid var(--glass-border); text-align: center; }
    .stat-value { font-size: 1.8rem; font-weight: 800; color: var(--accent-blue); }

    /* DASHBOARD ELEMENTS */
    h2 { padding-left: 15px; margin: 40px 0 20px; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 1px; }
    h2.title-daily { border-left: 4px solid var(--accent-blue); }
    h2.title-monthly { border-left: 4px solid var(--accent-gold); }
    h2.title-side { border-left: 4px solid var(--accent-purple); }

    .quest-item {
      background: rgba(255,255,255,0.02); padding: 18px; border-radius: 15px;
      margin-bottom: 12px; border: 1px solid var(--glass-border);
      display: flex; align-items: center; gap: 15px; cursor: grab;
    }
    .quest-item.type-daily { border-left: 4px solid var(--accent-blue); }
    .quest-item.type-monthly { border-left: 4px solid var(--accent-gold); }
    .quest-item.type-side { border-left: 4px solid var(--accent-purple); }
    .quest-item.dragging { opacity: 0.4; border: 1px dashed var(--accent-cyan); }

    .progress-box { background: rgba(255,255,255,0.02); padding: 15px; border-radius: 15px; border: 1px solid var(--glass-border); margin-bottom: 10px; }
    .progress-track { height: 6px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; }
    .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent-blue), var(--accent-cyan)); transition: width 0.8s ease; }

    .add-placeholder { background: rgba(255,255,255,0.01); border: 1px dashed var(--glass-border); color: var(--text-dim); width: 100%; padding: 16px; border-radius: 15px; cursor: pointer; text-align: center; font-weight: 600; margin-bottom: 20px; }
    
    #auth-screen { display: none; text-align: center; padding: 100px 20px; }
    .google-btn { background: white; color: #020617; padding: 15px 30px; border-radius: 15px; font-weight: 800; border: none; cursor: pointer; display: flex; align-items: center; gap: 10px; margin: 20px auto; }

    /* Modal Style */
    #goal-modal {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(2, 6, 23, 0.8); backdrop-filter: blur(15px);
      z-index: 3000; align-items: center; justify-content: center; padding: 20px;
    }
    .modal-content { background: #0f172a; border: 1px solid var(--glass-border); padding: 30px; border-radius: 25px; width: 100%; max-width: 400px; text-align: center; }
    .modal-content input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid var(--glass-border); background: #000; color: #fff; }

    .side-countdown-live { font-weight: 700; color: #facc15; background: rgba(250, 204, 21, 0.1); padding: 2px 10px; border-radius: 20px; font-size: 0.8rem; }
    
    @media (max-width: 600px) {
      .hero-title { font-size: 2.5rem; }
      .zen-quote { font-size: 1.3rem; }
      .header-info { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- SCREEN 1: HOMEPAGE (ZEN) -->
  <div id="homepage-screen">
    <div class="zen-reminder" id="zen-reminder-text">LOADING...</div>
    <div class="zen-quote" id="zen-quote-text">"Pikirkan tujuanmu, tarik napas, lalu mulai."</div>
    <button class="btn-enter" onclick="enterDashboard()">LIHAT PROGRESS GOAL</button>
  </div>

  <!-- SCREEN 2: AUTH -->
  <div id="auth-screen">
    <h1 class="hero-title">Masuk Dulu.</h1>
    <button class="google-btn" onclick="loginWithGoogle()">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18"> Masuk dengan Google
    </button>
  </div>

  <!-- SCREEN 3: DASHBOARD -->
  <div id="main-dashboard">
    <button onclick="backToHome()" style="background:none; border:none; color:var(--accent-cyan); cursor:pointer; margin-bottom: 20px; font-weight:600;">← Kembali ke Beranda</button>
    
    <div class="hero-section">
      <h1 class="hero-title">まず日本語。</h1>
    </div>

    <div class="header-info">
      <div class="stat-card"><div class="stat-label">Daily Reset In</div><div class="stat-value" id="dailyTimer">00:00:00</div></div>
      <div class="stat-card"><div class="stat-label">Current Streak</div><div class="stat-value" id="streakVal">🔥 0 Hari</div></div>
    </div>

    <!-- DAILY -->
    <h2 class="title-daily">⚔️ Daily Quests</h2>
    <div class="progress-box">
      <div class="progress-label">Daily Progress <span id="dailyPercent">0%</span></div>
      <div class="progress-track"><div class="progress-fill" id="dailyFill"></div></div>
    </div>
    <div id="dailyQuestsList" class="quest-list-container" data-type="daily"></div>
    <button onclick="openModal('daily')" class="add-placeholder">+ Tambah Goal Harian</button>

    <!-- MONTHLY -->
    <h2 class="title-monthly">🏆 Monthly Epic Goals</h2>
    <div class="progress-box">
      <div class="progress-label">Monthly Progress <span id="monthlyPercent">0%</span></div>
      <div class="progress-track"><div class="progress-fill" id="monthlyFill" style="background: var(--accent-gold);"></div></div>
    </div>
    <div id="monthlyGoalsList" class="quest-list-container" data-type="monthly"></div>
    <button onclick="openModal('monthly')" class="add-placeholder">+ Tambah Goal Bulanan</button>

    <!-- SIDE -->
    <h2 class="title-side">🔮 Side Quests</h2>
    <div id="sideQuestsList" class="quest-list-container" data-type="side"></div>
    <button onclick="openModal('side')" class="add-placeholder">+ Tambah Side Quest</button>
    
    <button onclick="logout()" style="width:100%; margin-top:50px; background:none; border:none; color:var(--text-dim); cursor:pointer; text-decoration:underline;">Logout Akun</button>
  </div>

  <!-- MODAL -->
  <div id="goal-modal">
    <div class="modal-content">
      <h3 id="modal-title">Tambah Goal</h3>
      <input type="text" id="modal-text" placeholder="Nama Goal...">
      <div id="modal-deadline-block" style="display:none; text-align:left;">
        <label style="font-size:0.7rem; color:var(--text-dim);">DEADLINE</label>
        <input type="date" id="modal-deadline">
      </div>
      <div style="display:flex; gap:10px; margin-top:20px;">
        <button onclick="closeModal()" style="flex:1; padding:10px; border-radius:10px; border:none; cursor:pointer;">Batal</button>
        <button id="btn-submit-goal" onclick="submitModal()" style="flex:1; padding:10px; border-radius:10px; border:none; background:var(--accent-blue); color:white; cursor:pointer; font-weight:700;">Simpan</button>
      </div>
    </div>
  </div>

  <script>
    // ==========================================
    // 1. KONFIGURASI (Ubah Kalimat Di Sini)
    // ==========================================
    const CONFIG = {
      reminder: "SISTEM PENUNJANG DISIPLIN",
      quote: "Bahasa Jepang bukan tentang siapa yang paling pintar, tapi siapa yang paling konsisten bertahan setiap hari.",
      // PASTE KREDENSIAL SUPABASE KAMU DI SINI
      SB_URL: 'https://ifdgmtzdgyldobeparjy.supabase.co',
      SB_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlmZGdtdHpkZ3lsZG9iZXBhcmp5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2ODY2MTIsImV4cCI6MjA5NDI2MjYxMn0.xJqjlPNZgU3vYHhuv1IF6ph4UvsJR7oSFYM8pVByVmw'
    };

    document.getElementById('zen-reminder-text').innerText = CONFIG.reminder;
    document.getElementById('zen-quote-text').innerText = `"${CONFIG.quote}"`;

    // ==========================================
    // 2. SISTEM NAVIGASI
    // ==========================================
    function enterDashboard() {
      document.getElementById('homepage-screen').style.display = 'none';
      checkUser();
    }

    function backToHome() {
      document.getElementById('main-dashboard').style.display = 'none';
      document.getElementById('homepage-screen').style.display = 'flex';
    }

    // ==========================================
    // 3. LOGIKA CORE (SUPABASE & GOALS)
    // ==========================================
    const clientApp = supabase.createClient(CONFIG.SB_URL, CONFIG.SB_KEY);
    let currentUser = null;
    let allGoals = [];
    let currentModalType = 'daily';
    let editingGoalId = null;
    let longPressTimeout, dragSrcElement;

    async function checkUser() {
      const { data: { user } } = await clientApp.auth.getUser();
      if (user) {
        currentUser = user;
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('main-dashboard').style.display = 'block';
        fetchData();
        startTimers();
        setupDragAndDropEvents();
      } else {
        document.getElementById('auth-screen').style.display = 'block';
      }
    }

    async function fetchData() {
      const { data } = await clientApp.from('goals').select('*').eq('user_id', currentUser.id).order('position', { ascending: true });
      allGoals = data || [];
      render();
    }

    function render() {
      const lists = { daily: document.getElementById("dailyQuestsList"), monthly: document.getElementById("monthlyGoalsList"), side: document.getElementById("sideQuestsList") };
      Object.values(lists).forEach(l => l.innerHTML = "");

      allGoals.forEach(g => {
        const item = document.createElement('div');
        item.className = `quest-item type-${g.type}`;
        item.setAttribute('data-id', g.id);
        item.setAttribute('data-type', g.type);
        
        let extraBadge = g.type === 'side' ? `<span class="side-countdown-live" data-deadline="${g.deadline}">...</span>` : '';

        item.innerHTML = `
          <input type="checkbox" style="width:20px; height:20px;" ${g.checked ? 'checked' : ''} onchange="toggleGoal('${g.id}', ${g.checked})">
          <div style="flex:1;">
            <div style="font-weight:600; ${g.checked ? 'text-decoration:line-through; opacity:0.4;' : ''}">${g.text} ${extraBadge}</div>
            <div style="font-size:0.7rem; color:var(--text-dim);">${g.deadline || ''}</div>
          </div>
          <div style="display:flex; gap:10px; opacity:0.5;">
            <button onclick="openModal('${g.type}', '${g.id}', '${g.text}', '${g.deadline}')" style="background:none; border:none; color:white; cursor:pointer;">📝</button>
            <button onclick="deleteGoal('${g.id}')" style="background:none; border:none; color:white; cursor:pointer;">🗑️</button>
          </div>
        `;
        
        setupLongPress(item);
        if (lists[g.type]) lists[g.type].appendChild(item);
      });
      updateProgressBars();
    }

    async function toggleGoal(id, status) {
      await clientApp.from('goals').update({ checked: !status }).eq('id', id);
      fetchData();
    }

    async function deleteGoal(id) {
      if(confirm("Hapus goal ini?")) {
        await clientApp.from('goals').delete().eq('id', id);
        fetchData();
      }
    }

    // Modal Logic
    function openModal(type, id=null, text='', deadline='') {
      currentModalType = type;
      editingGoalId = id;
      document.getElementById('modal-text').value = text;
      document.getElementById('modal-deadline-block').style.display = type === 'side' ? 'block' : 'none';
      document.getElementById('goal-modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('goal-modal').style.display = 'none'; }

    async function submitModal() {
      const text = document.getElementById('modal-text').value;
      const dl = document.getElementById('modal-deadline').value;
      if(!text) return;

      const payload = { 
        text, 
        user_id: currentUser.id, 
        type: currentModalType, 
        deadline: currentModalType === 'side' ? dl : (currentModalType === 'monthly' ? 'End of Month' : 'Daily Reset') 
      };

      if(editingGoalId) {
        await clientApp.from('goals').update(payload).eq('id', editingGoalId);
      } else {
        await clientApp.from('goals').insert([payload]);
      }
      closeModal();
      fetchData();
    }

    // Drag & Drop / Reorder
    function setupLongPress(el) {
      const start = () => longPressTimeout = setTimeout(() => { el.setAttribute('draggable', 'true'); el.style.background = "rgba(45,212,191,0.1)"; }, 500);
      const stop = () => { clearTimeout(longPressTimeout); };
      el.onmousedown = start; el.onmouseup = stop; el.ontouchstart = start; el.ontouchend = stop;
      el.ondragstart = function() { dragSrcElement = this; this.classList.add('dragging'); };
      el.ondragend = function() { this.classList.remove('dragging'); this.removeAttribute('draggable'); this.style.background = ""; };
    }

    function setupDragAndDropEvents() {
      document.querySelectorAll('.quest-list-container').forEach(container => {
        container.ondragover = e => {
          e.preventDefault();
          if(!dragSrcElement || dragSrcElement.dataset.type !== container.dataset.type) return;
          const afterEl = [...container.querySelectorAll('.quest-item:not(.dragging)')].reduce((closest, child) => {
            const box = child.getBoundingClientRect();
            const offset = e.clientY - box.top - box.height/2;
            return (offset < 0 && offset > closest.offset) ? { offset, element: child } : closest;
          }, { offset: Number.NEGATIVE_INFINITY }).element;
          afterEl ? container.insertBefore(dragSrcElement, afterEl) : container.appendChild(dragSrcElement);
        };
        container.ondrop = async () => {
          const updates = [...container.querySelectorAll('.quest-item')].map((el, i) => clientApp.from('goals').update({ position: i*10 }).eq('id', el.dataset.id));
          await Promise.all(updates);
        };
      });
    }

    function updateProgressBars() {
      ['daily', 'monthly'].forEach(t => {
        const items = allGoals.filter(g => g.type === t);
        const done = items.filter(g => g.checked).length;
        const pc = items.length ? Math.round((done/items.length)*100) : 0;
        document.getElementById(`${t}Fill`).style.width = pc+'%';
        document.getElementById(`${t}Percent`).innerText = pc+'%';
      });
    }

    function startTimers() {
      setInterval(() => {
        const now = new Date();
        const diff = new Date().setHours(24,0,0,0) - now;
        const h = Math.floor(diff/3600000).toString().padStart(2,'0');
        const m = Math.floor((diff%3600000)/60000).toString().padStart(2,'0');
        const s = Math.floor((diff%60000)/1000).toString().padStart(2,'0');
        document.getElementById("dailyTimer").innerText = `${h}:${m}:${s}`;
        
        document.querySelectorAll('.side-countdown-live').forEach(el => {
          const target = new Date(el.dataset.deadline + "T23:59:59");
          const sDiff = target - now;
          if(sDiff < 0) el.innerText = "Waktu Habis";
          else {
            const d = Math.floor(sDiff/(1000*60*60*24));
            el.innerText = d > 0 ? `${d+1} Hari lagi` : "Sisa Jam";
          }
        });
      }, 1000);
    }

    async function loginWithGoogle() { await clientApp.auth.signInWithOAuth({ provider: 'google' }); }
    async function logout() { await clientApp.auth.signOut(); location.reload(); }

    // Mulai dari pengecekan awal (untuk session)
    (async () => {
      const { data: { session } } = await clientApp.auth.getSession();
      if(session) {
        // Jika sudah login, homepage tetap tampil dulu (sesuai permintaanmu)
      }
    })();
  </script>
</body>
</html>
