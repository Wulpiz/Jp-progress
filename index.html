<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Japanese Focus - Cloud Ultra</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg-dark: #0f172a;
      --accent-blue: #3b82f6;
      --accent-cyan: #2dd4bf;
      --text-main: #f8fafc;
      --text-dim: #94a3b8;
      --glass: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.12);
    }

    * { box-sizing: border-box; transition: all 0.2s ease; }

    body {
      margin: 0; min-height: 100vh;
      background: radial-gradient(circle at 0% 0%, #1e293b 0%, #0f172a 100%);
      color: var(--text-main);
      font-family: 'Inter', system-ui, sans-serif;
      display: flex; justify-content: center; padding: 40px 20px;
    }

    /* Auth Screen */
    #auth-screen { text-align: center; max-width: 400px; margin-top: 100px; }
    .google-btn {
      display: flex; align-items: center; gap: 12px; background: white; color: #1f2937;
      padding: 14px 28px; border-radius: 16px; font-weight: 700; cursor: pointer; border: none;
    }

    /* Main Container */
    .container {
      display: none; width: 100%; max-width: 800px;
      background: var(--glass); border: 1px solid var(--glass-border);
      border-radius: 32px; padding: 40px; backdrop-filter: blur(20px);
    }

    h1 { text-align: center; font-size: 3rem; margin: 0; letter-spacing: -2px; }
    .subtitle { text-align: center; color: var(--accent-blue); margin-bottom: 30px; }

    /* Progress Section */
    .progress-bar { height: 12px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; margin: 10px 0 30px; }
    .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent-blue), var(--accent-cyan)); }

    /* Goal Item */
    .goal-item {
      background: rgba(255,255,255,0.03); padding: 20px; border-radius: 18px;
      margin-bottom: 12px; border: 1px solid var(--glass-border);
    }
    .goal-main { display: flex; align-items: center; gap: 15px; }
    .goal-text { flex: 1; font-size: 1.1rem; }
    .checked { text-decoration: line-through; opacity: 0.5; color: var(--accent-cyan); }
    
    /* Edit Panel */
    .edit-panel { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--glass-border); }
    .edit-panel.active { display: block; }
    .edit-input { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); color: white; padding: 10px; border-radius: 8px; margin-bottom: 10px; }

    /* Input New Goal */
    .input-section { 
      background: rgba(255,255,255,0.05); padding: 20px; border-radius: 20px; 
      margin-top: 30px; display: flex; flex-direction: column; gap: 10px;
    }
    .input-row { display: flex; gap: 10px; }
    input[type="text"], input[type="date"] {
      background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border);
      color: white; padding: 12px; border-radius: 10px; outline: none;
    }
    .add-btn { background: var(--accent-blue); color: white; border: none; padding: 12px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; }
    .save-btn { background: #22c55e; color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; margin-right: 10px; }
    .del-btn { background: #ef4444; color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; }

    #streak { color: #facc15; font-weight: bold; text-align: right; margin-bottom: 10px; }
  </style>
</head>
<body>

  <div id="auth-screen">
    <h1>まず日本語。</h1>
    <p style="color: var(--text-dim)">Lakukan sekarang, atau lupakan selamanya.</p>
    <button class="google-btn" onclick="loginWithGoogle()">Masuk dengan Google</button>
  </div>

  <div class="container" id="main-dashboard">
    <div id="streak">🔥 0 Hari</div>
    <h1>まず日本語。</h1>
    <div class="subtitle">Fokus pada proses, hasil akan mengikuti.</div>

    <div class="progress-section">
      <div style="display: flex; justify-content: space-between; font-size: 0.9rem;">
        <span>Target Tercapai</span>
        <span id="progressPercent">0%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>

    <div id="goalsList"></div>

    <div class="input-section">
      <div class="input-row">
        <input type="text" id="newGoalInput" placeholder="Apa goal belajarmu hari ini?" style="flex: 2;">
        <input type="date" id="newGoalDate" style="flex: 1;">
      </div>
      <button class="add-btn" onclick="addGoal()">Tambah Goal Baru</button>
    </div>

    <button onclick="logout()" style="background:none; border:none; color:var(--text-dim); cursor:pointer; margin-top:30px; width:100%">Logout Akun</button>
  </div>

  <script>
    const SB_URL = 'https://ifdgmtzdgyldobeparjy.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlmZGdtdHpkZ3lsZG9iZXBhcmp5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2ODY2MTIsImV4cCI6MjA5NDI2MjYxMn0.xJqjlPNZgU3vYHhuv1IF6ph4UvsJR7oSFYM8pVByVmw';
    const clientApp = supabase.createClient(SB_URL, SB_KEY);

    let goals = [];
    let currentUser = null;

    // --- SINKRONISASI DATA ---
    async function checkUser() {
      const { data: { user } } = await clientApp.auth.getUser();
      if (user) {
        currentUser = user;
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('main-dashboard').style.display = 'block';
        fetchData();
        loadStreak();
      }
    }

    async function fetchData() {
      const { data } = await clientApp.from('goals').select('*').order('created_at', { ascending: true });
      goals = data || [];
      render();
    }

    // --- CRUD ACTIONS ---
    async function addGoal() {
      const text = document.getElementById("newGoalInput").value;
      const date = document.getElementById("newGoalDate").value;
      if (!text || !date) return alert("Isi teks dan batas waktunya dulu ya!");

      const { data, error } = await clientApp.from('goals').insert([{ 
        text: text, 
        deadline: date, 
        user_id: currentUser.id 
      }]).select();

      if (!error) {
        goals.push(data[0]); // Langsung masukkan ke array lokal
        render(); // Langsung gambar ulang tanpa refresh
        document.getElementById("newGoalInput").value = "";
      }
    }

    async function toggleGoal(id, currentStatus) {
      // Update lokal dulu biar instan
      const goal = goals.find(g => g.id === id);
      goal.checked = !currentStatus;
      render();
      
      // Update ke database di background
      await clientApp.from('goals').update({ checked: !currentStatus }).eq('id', id);
      if(!currentStatus) updateStreakLogic();
    }

    async function updateGoal(id, index) {
      const newText = document.getElementById(`edit-text-${index}`).value;
      const newDate = document.getElementById(`edit-date-${index}`).value;
      
      const { error } = await clientApp.from('goals').update({ 
        text: newText, 
        deadline: newDate 
      }).eq('id', id);

      if (!error) {
        goals[index].text = newText;
        goals[index].deadline = newDate;
        alert("Goal berhasil diperbarui!");
        render();
      }
    }

    async function deleteGoal(id) {
      if(!confirm("Hapus goal ini?")) return;
      const { error } = await clientApp.from('goals').delete().eq('id', id);
      if(!error) {
        goals = goals.filter(g => g.id !== id);
        render();
      }
    }

    // --- UI RENDER ---
    function render() {
      const list = document.getElementById("goalsList");
      list.innerHTML = "";
      
      goals.forEach((goal, i) => {
        const item = document.createElement("div");
        item.className = "goal-item";
        item.innerHTML = `
          <div class="goal-main">
            <input type="checkbox" ${goal.checked ? "checked" : ""} onchange="toggleGoal('${goal.id}', ${goal.checked})">
            <div class="goal-text ${goal.checked ? 'checked' : ''}">
              ${goal.text}
              <div style="font-size:0.75rem; color:var(--text-dim)">Deadline: ${goal.deadline}</div>
            </div>
            <button onclick="document.getElementById('edit-${i}').classList.toggle('active')" style="background:none; border:none; cursor:pointer">⚙️</button>
          </div>
          <div class="edit-panel" id="edit-${i}">
            <label style="font-size:0.8rem">Ganti Judul:</label>
            <input type="text" class="edit-input" id="edit-text-${i}" value="${goal.text}">
            <label style="font-size:0.8rem">Ganti Batas Waktu:</label>
            <input type="date" class="edit-input" id="edit-date-${i}" value="${goal.deadline}">
            <button class="save-btn" onclick="updateGoal('${goal.id}', ${i})">Simpan Perubahan</button>
            <button class="del-btn" onclick="deleteGoal('${goal.id}')">Hapus</button>
          </div>
        `;
        list.appendChild(item);
      });
      updateProgress();
    }

    function updateProgress() {
      const total = goals.length;
      const done = goals.filter(g => g.checked).length;
      const percent = total === 0 ? 0 : Math.round((done / total) * 100);
      
      const fill = document.getElementById("progressFill");
      fill.style.width = percent + "%";
      document.getElementById("progressPercent").innerText = percent + "%";
    }

    // --- STREAK & AUTH (Same as before) ---
    function loadStreak() {
      const s = localStorage.getItem(`streak_${currentUser.id}`) || 0;
      document.getElementById("streak").innerText = `🔥 ${s} Hari`;
    }

    function updateStreakLogic() {
      const today = new Date().toDateString();
      if (localStorage.getItem(`lastDate_${currentUser.id}`) !== today) {
        let s = parseInt(localStorage.getItem(`streak_${currentUser.id}`)) || 0;
        s++;
        localStorage.setItem(`streak_${currentUser.id}`, s);
        localStorage.setItem(`lastDate_${currentUser.id}`, today);
        loadStreak();
      }
    }

    async function loginWithGoogle() { await clientApp.auth.signInWithOAuth({ provider: 'google' }); }
    async function logout() { await clientApp.auth.signOut(); location.reload(); }

    checkUser();
  </script>
</body>
</html>
