<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Japanese Focus - Hardcore Mode</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg-dark: #020617;
      --accent-blue: #3b82f6;
      --accent-cyan: #2dd4bf;
      --accent-red: #ef4444;
      --text-main: #f8fafc;
      --text-dim: #94a3b8;
      --glass: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
    }

    * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

    body {
      margin: 0; min-height: 100vh;
      background: radial-gradient(circle at 50% 50%, #0f172a 0%, #020617 100%);
      color: var(--text-main);
      font-family: 'Inter', system-ui, sans-serif;
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }

    /* Auth Screen */
    #auth-screen { background: var(--glass); backdrop-filter: blur(30px); padding: 60px 40px; border-radius: 40px; border: 1px solid var(--glass-border); text-align: center; max-width: 500px; width: 100%; }

    /* Container */
    .container { display: none; width: 100%; max-width: 900px; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 32px; padding: 40px; backdrop-filter: blur(25px); position: relative; }

    .header-info { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
    
    .stat-card { background: rgba(0,0,0,0.2); padding: 20px; border-radius: 20px; border: 1px solid var(--glass-border); text-align: center; }
    .stat-label { font-size: 0.7rem; text-transform: uppercase; color: var(--text-dim); letter-spacing: 1px; }
    .stat-value { font-size: 1.8rem; font-weight: 800; color: var(--accent-blue); }
    .timer-critical { color: var(--accent-red) !important; animation: blink 1s infinite; }

    h2 { border-left: 4px solid var(--accent-blue); padding-left: 15px; margin: 30px 0 15px; font-size: 1.2rem; }

    /* Quest Styles */
    .quest-item {
      background: rgba(255,255,255,0.02); padding: 18px; border-radius: 15px;
      margin-bottom: 10px; border: 1px solid var(--glass-border);
      display: flex; align-items: center; gap: 15px;
    }
    .quest-item:hover { background: rgba(255,255,255,0.05); }
    .quest-text { flex: 1; font-weight: 500; }
    .completed { opacity: 0.3; text-decoration: line-through; color: var(--accent-cyan); }

    .input-section { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 20px; margin-top: 20px; display: grid; grid-template-columns: 2fr 1fr auto; gap: 10px; }
    input { background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); color: white; padding: 12px; border-radius: 10px; outline: none; }
    .btn-add { background: var(--accent-blue); color: white; border: none; padding: 0 20px; border-radius: 10px; cursor: pointer; font-weight: bold; }

    @keyframes blink { 50% { opacity: 0.5; } }
    
    .google-btn { background: white; color: #020617; padding: 15px 30px; border-radius: 15px; font-weight: 800; border: none; cursor: pointer; display: flex; align-items: center; gap: 10px; margin: 0 auto; }
  </style>
</head>
<body>

  <div id="auth-screen">
    <h1 style="font-size: 3.5rem; margin:0; letter-spacing:-3px;">まず日本語。</h1>
    <p style="color: var(--accent-blue); margin-bottom:30px;">Daily Quest: Win or Lose Everything.</p>
    <button class="google-btn" onclick="loginWithGoogle()">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18"> Masuk dengan Google
    </button>
  </div>

  <div class="container" id="main-dashboard">
    <div class="header-info">
      <div class="stat-card">
        <div class="stat-label">Daily Reset In</div>
        <div class="stat-value" id="dailyTimer">00:00:00</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Current Streak</div>
        <div class="stat-value" id="streakVal" style="color: #facc15;">🔥 0</div>
      </div>
    </div>

    <h2>⚔️ Daily Quests</h2>
    <div id="dailyQuestsList">
      <!-- Fixed Daily Quests -->
    </div>

    <h2>🏆 Monthly Epic Goals</h2>
    <div class="stat-card" style="margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center;">
        <span class="stat-label">Bulan Ini Berakhir Dalam:</span>
        <span id="monthlyTimer" style="font-weight: 700; color: var(--accent-cyan);">00 Hari</span>
    </div>
    <div id="monthlyGoalsList"></div>

    <div class="input-section">
      <input type="text" id="monthInput" placeholder="Tambah Target Bulanan...">
      <input type="date" id="monthDate">
      <button class="btn-add" onclick="addMonthly()">+</button>
    </div>

    <button onclick="logout()" style="background:none; border:none; color:var(--text-dim); cursor:pointer; text-decoration: underline; font-size: 0.8rem; width:100%; margin-top:40px;">Logout Akun</button>
  </div>

  <script>
    const SB_URL = 'https://ifdgmtzdgyldobeparjy.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlmZGdtdHpkZ3lsZG9iZXBhcmp5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2ODY2MTIsImV4cCI6MjA5NDI2MjYxMn0.xJqjlPNZgU3vYHhuv1IF6ph4UvsJR7oSFYM8pVByVmw';
    const clientApp = supabase.createClient(SB_URL, SB_KEY);

    let currentUser = null;
    let dailyQuests = [
        { id: 'anki', text: 'Selesaikan Anki (Daily)', checked: false },
        { id: 'ln', text: 'Baca LN 1000 Character', checked: false },
        { id: 'immersion', text: 'Immersion 6 Jam', checked: false }
    ];
    let monthlyGoals = [];

    // --- INITIALIZATION ---
    async function checkUser() {
      const { data: { user } } = await clientApp.auth.getUser();
      if (user) {
        currentUser = user;
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('main-dashboard').style.display = 'block';
        loadState();
        fetchMonthly();
        startTimers();
      }
    }

    // --- DAILY LOGIC ---
    function loadState() {
      const saved = JSON.parse(localStorage.getItem(`daily_${currentUser.id}`));
      const today = new Date().toDateString();
      
      if (saved && saved.date === today) {
        dailyQuests = saved.quests;
      } else {
        // Cek apakah hari sebelumnya gagal (Penalti)
        if (saved && saved.date !== today) {
            const allDone = saved.quests.every(q => q.checked);
            if (!allDone) {
                updateStreak(0);
                alert("STREAK HANGUS! Kamu gagal menyelesaikan Daily Quest kemarin. Balik ke 0!");
            } else {
                // Berhasil kemarin, tambah streak 1x saja saat buka hari baru
                const lastStreakDate = localStorage.getItem(`last_streak_date_${currentUser.id}`);
                if (lastStreakDate !== today) {
                    incrementStreak();
                    localStorage.setItem(`last_streak_date_${currentUser.id}`, today);
                }
            }
        }
        saveState();
      }
      renderDaily();
      updateStreakDisplay();
    }

    function saveState() {
      const data = { date: new Date().toDateString(), quests: dailyQuests };
      localStorage.setItem(`daily_${currentUser.id}`, JSON.stringify(data));
    }

    function toggleDaily(id) {
      const q = dailyQuests.find(i => i.id === id);
      q.checked = !q.checked;
      saveState();
      renderDaily();
    }

    function renderDaily() {
      const list = document.getElementById("dailyQuestsList");
      list.innerHTML = dailyQuests.map(q => `
        <div class="quest-item">
          <input type="checkbox" ${q.checked ? 'checked' : ''} onchange="toggleDaily('${q.id}')" style="width:20px; height:20px;">
          <span class="quest-text ${q.checked ? 'completed' : ''}">${q.text}</span>
        </div>
      `).join('');
    }

    // --- MONTHLY LOGIC ---
    async function fetchMonthly() {
        const { data } = await clientApp.from('goals').select('*').order('created_at', { ascending: true });
        monthlyGoals = data || [];
        
        // Cek kegagalan bulan lalu
        const lastLoginMonth = localStorage.getItem(`last_month_${currentUser.id}`);
        const currentMonth = new Date().getMonth();
        if (lastLoginMonth != null && lastLoginMonth < currentMonth) {
            const unfinished = monthlyGoals.filter(g => !g.checked);
            if (unfinished.length > 0) {
                alert("Cupu amat, masa goal bulanan gini aja ga selesai? Lemah!");
            }
        }
        localStorage.setItem(`last_month_${currentUser.id}`, currentMonth);
        renderMonthly();
    }

    async function addMonthly() {
        const t = document.getElementById("monthInput").value;
        const d = document.getElementById("monthDate").value;
        if(!t || !d) return;
        const { data } = await clientApp.from('goals').insert([{ text: t, deadline: d, user_id: currentUser.id }]).select();
        monthlyGoals.push(data[0]);
        renderMonthly();
        document.getElementById("monthInput").value = "";
    }

    async function toggleMonthly(id, status) {
        await clientApp.from('goals').update({ checked: !status }).eq('id', id);
        fetchMonthly();
    }

    function renderMonthly() {
        const list = document.getElementById("monthlyGoalsList");
        list.innerHTML = monthlyGoals.map(g => `
            <div class="quest-item" style="border-left: 3px solid var(--accent-cyan)">
                <input type="checkbox" ${g.checked ? 'checked' : ''} onchange="toggleMonthly('${g.id}', ${g.checked})">
                <span class="quest-text ${g.checked ? 'completed' : ''}">${g.text} <br> <small style="color:var(--text-dim)">Due: ${g.deadline}</small></span>
            </div>
        `).join('');
    }

    // --- TIMERS & STREAK ---
    function startTimers() {
        setInterval(() => {
            // Daily Timer
            const now = new Date();
            const midnight = new Date().setHours(24, 0, 0, 0);
            const diff = midnight - now;
            
            const h = Math.floor(diff / 3600000).toString().padStart(2, '0');
            const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
            const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
            
            const timerEl = document.getElementById("dailyTimer");
            timerEl.innerText = `${h}:${m}:${s}`;
            if (diff < 3600000) timerEl.classList.add('timer-critical');

            // Monthly Timer
            const endOfMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0);
            const mDiff = endOfMonth - now;
            const daysLeft = Math.floor(mDiff / (1000 * 60 * 60 * 24));
            
            const mEl = document.getElementById("monthlyTimer");
            if (daysLeft > 0) {
                mEl.innerText = `${daysLeft} Hari lagi`;
            } else {
                // Jika tinggal hari terakhir, tampilkan jam
                mEl.innerText = `${h}:${m}:${s}`;
            }
        }, 1000);
    }

    function updateStreak(val) {
        localStorage.setItem(`streak_${currentUser.id}`, val);
        updateStreakDisplay();
    }

    function incrementStreak() {
        let s = parseInt(localStorage.getItem(`streak_${currentUser.id}`)) || 0;
        s++;
        updateStreak(s);
    }

    function updateStreakDisplay() {
        const s = localStorage.getItem(`streak_${currentUser.id}`) || 0;
        document.getElementById("streakVal").innerText = `🔥 ${s}`;
    }

    async function loginWithGoogle() { await clientApp.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.href } }); }
    async function logout() { await clientApp.auth.signOut(); location.reload(); }

    checkUser();
  </script>
</body>
</html>
