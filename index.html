<script>
  const SB_URL = 'https://ifdgmtzdgyldobeparjy.supabase.co';
  const SB_KEY = 'YOUR_SUPABASE_ANON_KEY';

  const clientApp = window.supabase.createClient(SB_URL, SB_KEY);

  let currentUser = null;
  let allGoals = [];
  let currentModalType = 'daily';
  let clockInterval = null;

  // =========================
  // AUTH
  // =========================
  async function checkUser() {
    const {
      data: { session }
    } = await clientApp.auth.getSession();

    if (session?.user) {
      currentUser = session.user;

      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('main-dashboard').style.display = 'block';

      await fetchData();

      if (!clockInterval) {
        startClock();
      }
    }
  }

  async function loginWithGoogle() {
    await clientApp.auth.signInWithOAuth({
      provider: 'google',
      options: {
        redirectTo: window.location.href
      }
    });
  }

  async function logout() {
    await clientApp.auth.signOut();
    location.reload();
  }

  // =========================
  // FETCH DATA
  // =========================
  async function fetchData() {
    if (!currentUser) return;

    const { data, error } = await clientApp
      .from('goals')
      .select('*')
      .eq('user_id', currentUser.id)
      .order('created_at', { ascending: true });

    if (error) {
      console.error(error);
      return;
    }

    allGoals = data || [];
    render();
  }

  // =========================
  // MODAL
  // =========================
  function openModal(type) {
    currentModalType = type;

    document.getElementById('modal-title').innerText =
      type === 'daily'
        ? 'Tambah Goal Harian'
        : 'Tambah Goal Bulanan';

    document.getElementById('goal-modal').style.display = 'flex';

    const input = document.getElementById('modal-text');
    input.value = '';

    setTimeout(() => {
      input.focus();
    }, 50);
  }

  function closeModal() {
    document.getElementById('goal-modal').style.display = 'none';
    document.getElementById('modal-text').value = '';
  }

  window.addEventListener('click', (e) => {
    const modal = document.getElementById('goal-modal');

    if (e.target === modal) {
      closeModal();
    }
  });

  async function submitModal() {
    const input = document.getElementById('modal-text');
    const text = input.value.trim();

    if (!text) return;

    const { data, error } = await clientApp
      .from('goals')
      .insert([
        {
          text: text,
          user_id: currentUser.id,
          type: currentModalType,
          checked: false
        }
      ])
      .select();

    if (error) {
      console.error(error);
      return;
    }

    if (data && data.length > 0) {
      allGoals.push(data[0]);
    }

    closeModal();
    render();
  }

  // ENTER KEY
  document.addEventListener('keydown', (e) => {
    const modalVisible =
      document.getElementById('goal-modal').style.display === 'flex';

    if (modalVisible && e.key === 'Enter') {
      submitModal();
    }

    if (modalVisible && e.key === 'Escape') {
      closeModal();
    }
  });

  // =========================
  // GOALS
  // =========================
  async function toggleGoal(id, status) {
    const newStatus = !status;

    const { error } = await clientApp
      .from('goals')
      .update({ checked: newStatus })
      .eq('id', id);

    if (error) {
      console.error(error);
      return;
    }

    const target = allGoals.find(g => g.id === id);

    if (target) {
      target.checked = newStatus;
    }

    render();
  }

  async function deleteGoal(id) {
    const { error } = await clientApp
      .from('goals')
      .delete()
      .eq('id', id);

    if (error) {
      console.error(error);
      return;
    }

    allGoals = allGoals.filter(g => g.id !== id);

    render();
  }

  // =========================
  // RENDER
  // =========================
  function render() {
    const dList = document.getElementById('dailyList');
    const mList = document.getElementById('monthlyList');

    dList.innerHTML = '';
    mList.innerHTML = '';

    allGoals.forEach((g) => {
      const deadlineLabel =
        g.type === 'daily'
          ? '⌛ Daily Reset'
          : '🗓️ End of Month';

      const wrapper = document.createElement('div');

      wrapper.className = 'goal-card';

      wrapper.innerHTML = `
        <input
          type="checkbox"
          class="checkbox"
          ${g.checked ? 'checked' : ''}
        >

        <div class="goal-info">
          <div class="goal-text ${g.checked ? 'completed' : ''}">
            ${escapeHtml(g.text)}
          </div>

          <div class="goal-deadline">
            ${deadlineLabel}
          </div>
        </div>

        <button class="btn-delete">🗑️</button>
      `;

      const checkbox = wrapper.querySelector('.checkbox');
      checkbox.addEventListener('change', () => {
        toggleGoal(g.id, g.checked);
      });

      const deleteBtn = wrapper.querySelector('.btn-delete');
      deleteBtn.addEventListener('click', () => {
        deleteGoal(g.id);
      });

      if (g.type === 'monthly') {
        mList.appendChild(wrapper);
      } else {
        dList.appendChild(wrapper);
      }
    });

    updateProgress();
  }

  // =========================
  // PROGRESS
  // =========================
  function updateProgress() {
    const total = allGoals.length;

    const done = allGoals.filter(g => g.checked).length;

    const percent =
      total === 0
        ? 0
        : Math.round((done / total) * 100);

    document.getElementById('progressFill').style.width =
      percent + '%';

    document.getElementById('percentText').innerText =
      percent + '%';

    document.getElementById('streakDisplay').innerText =
      `🔥 ${localStorage.getItem('streak_' + currentUser.id) || 0} Hari`;
  }

  // =========================
  // CLOCK
  // =========================
  function startClock() {
    updateClock();

    clockInterval = setInterval(updateClock, 1000);
  }

  function updateClock() {
    const now = new Date();

    document.getElementById('clock').innerText =
      now
        .toLocaleTimeString('id-ID', {
          hour12: false
        })
        .replace(/:/g, '.');

    document.getElementById('dateText').innerText =
      now.toLocaleDateString('id-ID', {
        weekday: 'long',
        day: 'numeric',
        month: 'long',
        year: 'numeric'
      });
  }

  // =========================
  // SECURITY
  // =========================
  function escapeHtml(text) {
    const div = document.createElement('div');
    div.innerText = text;
    return div.innerHTML;
  }

  // =========================
  // INIT
  // =========================
  checkUser();

  clientApp.auth.onAuthStateChange((_event, session) => {
    if (session?.user) {
      checkUser();
    }
  });
</script>
